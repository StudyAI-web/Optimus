<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimus - Task Reminder</title>
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Notification Prompt Banner */
        .notification-banner {
            background: #e0e7ff;
            color: #3730a3;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1);
        }

        .notification-banner button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .notification-banner button:hover {
            background: var(--primary-hover);
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: var(--primary);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .hidden {
            display: none !important;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* Social Login Buttons */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-social:hover {
            background: #f9fafb;
        }

        .btn-social.full-width {
            grid-column: span 2;
        }

        /* Dashboard Styling */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            color: #ef4444;
        }

        .task-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .task-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .task-item.completed span {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .delete-task {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- NOTIFICATION PERMISSION BANNER -->
    <div id="notification-banner" class="notification-banner hidden">
        <span>Enable reminders for your tasks?</span>
        <button onclick="requestNotificationPermission()">Allow</button>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-card" class="container">
        <h1>Optimus</h1>
        <p class="subtitle">Never forget your daily tasks.</p>

        <div class="social-grid">
            <button class="btn-social" onclick="mockLogin('Google')">
                <i class="fab fa-google" style="color: #ea4335;"></i> Google
            </button>
            <button class="btn-social" onclick="mockLogin('Facebook')">
                <i class="fab fa-facebook" style="color: #1877f2;"></i> Facebook
            </button>
            <button class="btn-social full-width" onclick="mockLogin('iCloud')">
                <i class="fab fa-apple"></i> Sign in with Apple
            </button>
        </div>

        <div class="divider">or use email</div>

        <form id="login-form" onsubmit="handleEmailLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Log In</button>
        </form>
    </div>

    <!-- MAIN APP DASHBOARD -->
    <div id="dashboard-card" class="container hidden">
        <div class="header-actions">
            <div>
                <h2>My Tasks</h2>
                <p class="subtitle" id="welcome-text" style="text-align: left; margin-bottom: 0;"></p>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="task-input-group">
            <input type="text" id="task-input" placeholder="What do you need to do?">
            <button class="btn" style="width: auto; padding: 12px 20px;" onclick="addTask()">Add</button>
        </div>

        <ul id="task-list" class="task-list"></ul>
    </div>

    <script>
        // DOM Elements
        const loginCard = document.getElementById('login-card');
        const dashboardCard = document.getElementById('dashboard-card');
        const welcomeText = document.getElementById('welcome-text');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');
        const notificationBanner = document.getElementById('notification-banner');

        // State Management
        let tasks = JSON.parse(localStorage.getItem('optimus_tasks')) || [];

        // Handle Social Login
        function mockLogin(provider) {
            showDashboard(`Logged in via ${provider}`);
        }

        // Handle Email Login
        function handleEmailLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            showDashboard(email);
        }

        // Switch View to Dashboard & Check Notification Settings
        function showDashboard(userIdentifier) {
            loginCard.classList.add('hidden');
            dashboardCard.classList.remove('hidden');
            welcomeText.innerText = `Workspace: ${userIdentifier}`;
            renderTasks();
            checkNotificationStatus();
        }

        // Check if browser allows notifications
        function checkNotificationStatus() {
            if ("Notification" in window) {
                if (Notification.permission === "default") {
                    notificationBanner.classList.remove('hidden');
                }
            }
        }

        // Ask user for permission explicitly
        function requestNotificationPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    new Notification("Optimus", {
                        body: "Reminders are now enabled!",
                        icon: "https://flaticon.com"
                    });
                }
                notificationBanner.classList.add('hidden');
            });
        }

        // Logout function
        function logout() {
            dashboardCard.classList.add('hidden');
            notificationBanner.classList.add('hidden');
            loginCard.classList.remove('hidden');
            document.getElementById('login-form').reset();
        }

        // Add task and trigger a notification reminder
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;

            const newTask = {
                id: Date.now(),
                text: text,
                completed: false
            };

            tasks.push(newTask);
            saveAndRender();
            
            // Trigger native system notification if permission was granted
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("Task Added!", {
                    body: `Don't forget to complete: "${text}"`,
                });
            }

            taskInput.value = '';
        }

        function toggleTask(id) {
            tasks = tasks.map(task => {
                if (task.id === id) {
                    return { ...task, completed: !task.completed };
                }
                return task;
            });
            saveAndRender();
        }

        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('optimus_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = `<li class="subtitle" style="text-align: center; list-style: none; margin-top: 20px;">No tasks yet! Add one above.</li>`;
                return;
            }

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                li.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleTask(${task.id})">
                        <span>${task.text}</span>
                    </div>
                    <button class="delete-task" onclick="deleteTask(${task.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                taskList.appendChild(li);
            });
        }

        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>
</body>
</html>
